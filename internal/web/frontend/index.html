<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rally Web UI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header>
    <h1>Rally</h1>
    <span class="subtitle" data-i18n="subtitle">Multi-VPS Bandwidth Aggregation</span>
    <div class="status-bar">
      <span id="statusProxy">● Proxy: <span class="offline" data-i18n="stopped">Stopped</span></span>
      <span id="statusBackends"><span data-i18n="nodesLabel">Nodes</span>: <span id="nodeCount">0</span> <span data-i18n="online">online</span></span>
      <select id="langSwitch" class="lang-select">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
    </div>
  </header>

  <nav>
    <button class="tab active" data-tab="dashboard" data-i18n="tabDashboard">Dashboard</button>
    <button class="tab" data-tab="nodes" data-i18n="tabNodes">Nodes</button>
    <button class="tab" data-tab="config" data-i18n="tabConfig">Config</button>
    <button class="tab" data-tab="logs" data-i18n="tabLogs">Logs</button>
  </nav>

  <main>
    <!-- Dashboard -->
    <section id="tab-dashboard" class="tab-content active">
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-label" data-i18n="totalNodes">Total Nodes</span>
          <span class="stat-value" id="statTotal">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label" data-i18n="activeLabel">Active</span>
          <span class="stat-value" id="statActive">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label" data-i18n="disabledLabel">Disabled</span>
          <span class="stat-value" id="statDisabled">0</span>
        </div>
      </div>

      <div class="toolbar">
        <button id="btnRefreshDashboard" data-i18n="refresh">Refresh</button>
        <button id="btnResetTraffic" style="background:var(--surface2);color:var(--orange);border:1px solid var(--border);" data-i18n="resetTraffic">Reset Traffic</button>
      </div>
      <div class="speed-bar">
        <span><span data-i18n="downSpeed">Down</span>: <strong id="statDownRate" style="color:var(--accent)">0 B/s</strong></span>
        <span><span data-i18n="upSpeed">Up</span>: <strong id="statUpRate" style="color:var(--green)">0 B/s</strong></span>
        <span><span data-i18n="totalDown">Total Down</span>: <span id="statDownTotal">0 B</span></span>
        <span><span data-i18n="totalUp">Total Up</span>: <span id="statUpTotal">0 B</span></span>
      </div>
      <h3 data-i18n="nodeStatus">Node Status</h3>
      <table id="dashboardTable">
        <thead><tr>
          <th data-i18n="nameCol">Name</th>
          <th data-i18n="typeCol">Type</th>
          <th data-i18n="serverCol">Server</th>
          <th data-i18n="statusCol">Status</th>
          <th data-i18n="activeConnsCol">Active</th>
          <th data-i18n="downSpeed">下行速率</th>
          <th data-i18n="downTraffic">Down</th>
          <th data-i18n="enabledCol">Enabled</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- Nodes -->
    <section id="tab-nodes" class="tab-content">
      <div class="toolbar">
        <button id="btnAddNode" data-i18n="addNode">+ Add Node</button>
        <button id="btnRefreshNodes" data-i18n="refresh">Refresh</button>
      </div>
      <table id="nodeTable">
        <thead><tr>
          <th data-i18n="nameCol">Name</th>
          <th data-i18n="typeCol">Type</th>
          <th data-i18n="serverCol">Server</th>
          <th data-i18n="portCol">Port</th>
          <th data-i18n="passwordCol">Password</th>
          <th data-i18n="actionsCol">Actions</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="tab-logs" class="tab-content">
      <div class="toolbar">
        <button id="btnClearLogs" data-i18n="clearBtn">Clear</button>
        <button id="btnLogStream" data-i18n="autoScroll">Auto Scroll</button>
      </div>
      <div class="log-container" id="logContainer">
        <div id="logContent"></div>
      </div>
    </section>

    <!-- Config -->
    <section id="tab-config" class="tab-content">
      <div class="toolbar">
        <button id="btnSaveConfig" data-i18n="saveConfigBtn">Save Config</button>
        <button id="btnReloadConfig" data-i18n="reloadBtn">Reload</button>
      </div>
      <textarea id="configEditor" spellcheck="false"></textarea>
    </section>
  </main>

  <!-- Node Form Modal -->
  <div id="nodeModal" class="modal" style="display:none">
    <div class="modal-content">
      <span id="btnCloseNodeModal" class="close">&times;</span>
      <h2 id="modalTitle" data-i18n="addNodeTitle">Add Node</h2>
      <form id="nodeForm">
        <input type="hidden" id="editIndex" value="">
        <div class="form-row">
          <label for="nodeName" data-i18n="nameLabel">Name</label>
          <input id="nodeName" required>
        </div>
        <div class="form-row">
          <label for="nodeType" data-i18n="typeLabel">Type</label>
          <select id="nodeType">
            <option value="hysteria2">Hysteria2</option>
            <option value="socks5">SOCKS5</option>
            <option value="ss">Shadowsocks</option>
            <option value="trojan">Trojan</option>
            <option value="vless">VLESS</option>
          </select>
        </div>
        <div class="form-row">
          <label for="nodeServer" data-i18n="serverLabel">Server</label>
          <input id="nodeServer" required placeholder="IP or domain">
        </div>
        <div class="form-row">
          <label for="nodePort" data-i18n="portLabel">Port</label>
          <input id="nodePort" type="number" required>
        </div>
        <div class="form-row" id="rowPassword">
          <label for="nodePassword" data-i18n="passwordLabel">Password</label>
          <input id="nodePassword" placeholder="Auth password">
        </div>
        <div class="form-row" id="rowSNI">
          <label for="nodeSNI" data-i18n="sniLabel">SNI</label>
          <input id="nodeSNI" placeholder="TLS SNI (optional)">
        </div>
        <div class="form-row" id="rowCipher" style="display:none">
          <label for="nodeCipher" data-i18n="cipherLabel">Cipher</label>
          <select id="nodeCipher">
            <option value="AEAD_CHACHA20_POLY1305">AEAD_CHACHA20_POLY1305</option>
            <option value="AEAD_AES_128_GCM">AEAD_AES_128_GCM</option>
            <option value="AEAD_AES_256_GCM">AEAD_AES_256_GCM</option>
          </select>
        </div>
        <div class="form-row" id="rowUUID" style="display:none">
          <label for="nodeUUID" data-i18n="uuidLabel">UUID</label>
          <input id="nodeUUID" placeholder="VLESS UUID">
        </div>
        <div class="form-row" id="rowDownMbps" style="display:none">
          <label for="nodeDownMbps" data-i18n="downMbpsLabel">Down Mbps</label>
          <input id="nodeDownMbps" type="number" placeholder="e.g. 500">
        </div>
        <div class="form-row" id="rowUpMbps" style="display:none">
          <label for="nodeUpMbps" data-i18n="upMbpsLabel">Up Mbps</label>
          <input id="nodeUpMbps" type="number" placeholder="e.g. 50">
        </div>
        <div class="form-actions">
          <button type="submit" id="btnSubmitNode" data-i18n="addNodeBtn">Add Node</button>
          <button type="button" id="btnCancelNode" data-i18n="cancelBtn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>
</div>
<script src="app.js"></script>
</body>
</html>
